<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7cc6fe" />
    <meta name="description" content="Your companion app for achieving real independence through quest-based productivity." />
    <link rel="manifest" href="/Independence-Quest-v2/manifest.webmanifest" />
    <link rel="icon" href="/Independence-Quest-v2/icon-192.png" />
    <title>Independence Campaign — Claim Your Own Keep</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/Independence-Quest-v2/sw.js', { scope: '/Independence-Quest-v2/' })
            .then((reg) => console.log('SW registered:', reg.scope))
            .catch((err) => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
